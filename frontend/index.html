<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Periodt">
<title>Periodt — Period Tracker</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0a14;
    --surface: #17101f;
    --surface2: #1e1529;
    --border: #2d2040;
    --rose: #c96fa8;
    --rose-soft: #e896c8;
    --rose-dim: #7d3d68;
    --lavender: #9b7ec8;
    --gold: #d4a96a;
    --text: #f0e8f5;
    --text-muted: #8a7a9e;
    --fertile: #6ec9a0;
    --fertile-dim: #2d6650;
    --radius: 18px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-y: auto;
  }

  /* Orb background */
  body::before {
    content: '';
    position: fixed;
    top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(201,111,168,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 430px;
    margin: 0 auto;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    padding: calc(var(--safe-top) + 20px) 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--rose-soft);
  }
  .logo span { color: var(--text-muted); font-size: 13px; font-family: 'DM Sans', sans-serif; display: block; letter-spacing: 0.2em; text-transform: uppercase; }

  .header-actions { display: flex; gap: 10px; }

  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
  }
  .icon-btn:hover, .icon-btn.active { border-color: var(--rose-dim); color: var(--rose-soft); background: rgba(201,111,168,0.1); }

  /* ── Nav ─────────────────────────────────────────────────────── */
  nav {
    display: flex;
    gap: 4px;
    padding: 0 24px 16px;
    flex-shrink: 0;
  }

  .nav-btn {
    flex: 1;
    padding: 10px 4px;
    border: none;
    border-radius: 12px;
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.25s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .nav-btn .nav-icon { font-size: 20px; transition: transform 0.25s; }
  .nav-btn.active { color: var(--rose-soft); background: rgba(201,111,168,0.1); }
  .nav-btn.active .nav-icon { transform: scale(1.15); }

  /* ── Scrollable content ──────────────────────────────────────── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px calc(var(--safe-bottom) + 24px);
    scroll-behavior: smooth;
  }
  main::-webkit-scrollbar { display: none; }

  /* ── Views ───────────────────────────────────────────────────── */
  .view { display: none; }
  .view.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ── Cards ───────────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--rose-soft);
    margin-bottom: 14px;
    letter-spacing: 0.04em;
  }

  /* ── Status pill ─────────────────────────────────────────────── */
  .status-ring {
    width: 140px; height: 140px;
    margin: 10px auto 20px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .status-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .status-ring-inner {
    text-align: center;
    z-index: 1;
  }
  .status-ring-inner .day-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    line-height: 1;
    color: var(--text);
  }
  .status-ring-inner .day-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .phase-badge {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    margin: 0 auto;
  }
  .phase-menstrual { background: rgba(201,111,168,0.2); color: var(--rose-soft); border: 1px solid var(--rose-dim); }
  .phase-follicular { background: rgba(155,126,200,0.2); color: var(--lavender); border: 1px solid #6b539e; }
  .phase-ovulation { background: rgba(110,201,160,0.2); color: var(--fertile); border: 1px solid var(--fertile-dim); }
  .phase-luteal { background: rgba(212,169,106,0.2); color: var(--gold); border: 1px solid #8c6a30; }
  .phase-unknown { background: rgba(138,122,158,0.15); color: var(--text-muted); border: 1px solid var(--border); }

  /* ── Prediction row ──────────────────────────────────────────── */
  .pred-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .pred-row:last-child { border-bottom: none; }
  .pred-label { font-size: 13px; color: var(--text-muted); }
  .pred-value { font-size: 13px; color: var(--text); font-weight: 500; }
  .pred-value.rose { color: var(--rose-soft); }
  .pred-value.green { color: var(--fertile); }

  /* ── Calendar ────────────────────────────────────────────────── */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-month {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
  }
  .cal-nav { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: color 0.2s; }
  .cal-nav:hover { color: var(--rose-soft); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dow { text-align: center; font-size: 11px; letter-spacing: 0.1em; color: var(--text-muted); padding: 6px 0; text-transform: uppercase; }
  .cal-day {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    font-size: 13px;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
    border: none;
    background: none;
    color: var(--text);
  }
  .cal-day:hover:not(.empty) { background: var(--surface2); }
  .cal-day.empty { cursor: default; color: transparent; }
  .cal-day.today { color: var(--rose-soft); font-weight: 500; }
  .cal-day.today::after { content: ''; width: 4px; height: 4px; background: var(--rose-soft); border-radius: 50%; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); }
  .cal-day.period { background: rgba(201,111,168,0.25); color: var(--rose-soft); }
  .cal-day.period-start { background: var(--rose-dim); color: white; }
  .cal-day.fertile { background: rgba(110,201,160,0.2); color: var(--fertile); }
  .cal-day.predicted { border: 1px dashed var(--rose-dim); color: var(--rose); }
  .cal-day.has-symptoms::before { content: ''; width: 4px; height: 4px; background: var(--lavender); border-radius: 50%; position: absolute; top: 3px; right: 3px; }

  /* ── Log form ────────────────────────────────────────────────── */
  .form-section { margin-bottom: 18px; }
  .form-label { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display: block; }

  .symptom-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .symptom-chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .symptom-chip.selected { border-color: var(--lavender); background: rgba(155,126,200,0.15); color: var(--lavender); }

  .mood-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .mood-btn {
    flex: 1; min-width: 56px;
    padding: 10px 4px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 22px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .mood-btn span { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
  .mood-btn.selected { border-color: var(--rose-dim); background: rgba(201,111,168,0.12); color: var(--rose-soft); }

  .pain-slider { width: 100%; accent-color: var(--rose); height: 4px; border-radius: 2px; }

  input[type=date], textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type=date]:focus, textarea:focus { border-color: var(--rose-dim); }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
  textarea { resize: vertical; min-height: 80px; }

  .flow-row { display: flex; gap: 8px; }
  .flow-btn {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .flow-btn .flow-dots { font-size: 8px; letter-spacing: 2px; }
  .flow-btn.selected { border-color: var(--rose-dim); background: rgba(201,111,168,0.12); color: var(--rose-soft); }

  /* ── Buttons ─────────────────────────────────────────────────── */
  .btn-primary {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--rose-dim), #5a2a50);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 6px;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    padding: 10px 20px;
    border-radius: 12px;
    border: 1px solid var(--rose-dim);
    background: transparent;
    color: var(--rose-soft);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-secondary:hover { background: rgba(201,111,168,0.1); }

  /* ── Cycle history list ──────────────────────────────────────── */
  .cycle-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .cycle-item:last-child { border-bottom: none; }
  .cycle-dates { font-size: 14px; color: var(--text); }
  .cycle-dates small { display: block; color: var(--text-muted); font-size: 12px; margin-top: 2px; }
  .cycle-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 6px; border-radius: 8px; transition: color 0.2s; }
  .cycle-delete:hover { color: #e06a6a; }

  /* ── Toast ───────────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 80px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 22px;
    border-radius: 30px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Install banner ──────────────────────────────────────────── */
  #install-banner {
    margin-bottom: 14px;
    background: linear-gradient(135deg, rgba(201,111,168,0.15), rgba(155,126,200,0.1));
    border: 1px solid var(--rose-dim);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: none;
    align-items: center;
    gap: 12px;
  }
  #install-banner.visible { display: flex; }
  #install-banner p { flex: 1; font-size: 13px; color: var(--text-muted); }
  #install-banner strong { color: var(--text); }

  /* ── Offline indicator ───────────────────────────────────────── */
  #offline-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #4a3800;
    color: #f0c050;
    text-align: center;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 6px;
    transform: translateY(-100%);
    transition: transform 0.3s;
    z-index: 1000;
  }
  #offline-bar.show { transform: translateY(0); }

  /* Pain level display */
  .pain-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
</style>
</head>
<body>

<div id="offline-bar">⚡ <span data-i18n="offline"></span></div>
<div id="toast"></div>

<div id="app">
  <header>
    <div>
      <div class="logo">Periodt <span data-i18n="description"></span></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="notif-btn" data-i18n-title="enable_notifications">🔔</button>
      <button class="icon-btn" id="install-btn" data-i18n-title="install" style="display:none">📲</button>
      <select id="lang-select" class="icon-btn" style="font-size:12px;">
        <option value="en">EN</option>
        <option value="cat">CAT</option>
        <option value="es">ES</option>
      </select>
    </div>
  </header>

  <nav>
    <button class="nav-btn active" data-view="home">
      <span class="nav-icon">🌙</span><span data-i18n="today"></span>
    </button>
    <button class="nav-btn" data-view="log">
      <span class="nav-icon">✦</span><span data-i18n="log"></span>
    </button>
    <button class="nav-btn" data-view="history">
      <span class="nav-icon">◎</span><span data-i18n="history"></span>
    </button>
  </nav>

  <main>

    <!-- ── HOME ──────────────────────────────────────────────── -->
    <div class="view active" id="view-home">
    
      <div id="install-banner">
        <span style="font-size:28px">📲</span>
        <p>
          <strong data-i18n="install_title"></strong>
          <span data-i18n="install_desc"></span>
        </p>
        <button class="btn-secondary" id="install-banner-btn" data-i18n="install"></button>
      </div>

      <div class="card" style="text-align:center; padding: 28px 20px;">
        <div class="status-ring">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="60" fill="none" stroke="var(--surface2)" stroke-width="6"/>
            <circle id="ring-progress" cx="70" cy="70" r="60" fill="none" stroke="var(--rose-dim)" stroke-width="6"
              stroke-dasharray="377" stroke-dashoffset="377" stroke-linecap="round" style="transition: stroke-dashoffset 1s ease"/>
          </svg>
          <div class="status-ring-inner">
            <div class="day-num" id="day-num">—</div>
            <div class="day-label" data-i18n="day_of_cycle"></div>
          </div>
        </div>
        <div id="phase-badge" class="phase-badge phase-unknown"></div>
      </div>

      <div class="card" id="prediction-card">
        <div class="card-title" data-i18n="next_period"></div>
        <div id="predictions-content">
          <div class="pred-row">
            <span class="pred-label" data-i18n="next_period"></span>
            <span class="pred-value rose" id="pred-next">—</span>
          </div>
          <div class="pred-row">
            <span class="pred-label" data-i18n="fertile_window"></span>
            <span class="pred-value green" id="pred-fertile">—</span>
          </div>
          <div class="pred-row">
            <span class="pred-label" data-i18n="avg_cycle_length"></span>
            <span class="pred-value" id="pred-cycle">—</span>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="cal-header">
          <button class="cal-nav" id="cal-prev">‹</button>
          <div class="cal-month" id="cal-month-label">Month Year</div>
          <button class="cal-nav" id="cal-next">›</button>
        </div>
        <div class="cal-grid" id="cal-dow"></div>
        <div class="cal-grid" id="cal-days"></div>
      </div>

      <div class="card" id="cal-legend">
        <div class="card-title" data-i18n="legend"></div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <div style="display:flex;align-items:center;gap:10px;font-size:13px;">
            <div style="width:22px;height:22px;border-radius:50%;background:rgba(201,111,168,0.25);flex-shrink:0;"></div>
            <span data-i18n="period_days"></span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;font-size:13px;">
            <div style="width:22px;height:22px;border-radius:50%;background:rgba(110,201,160,0.2);flex-shrink:0;"></div>
            <span data-i18n="estimated_fertile"></span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;font-size:13px;">
            <div style="width:22px;height:22px;border-radius:50%;border:1px dashed var(--rose-dim);flex-shrink:0;"></div>
            <span data-i18n="predicted_period"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── LOG ────────────────────────────────────────────────── -->
    <div class="view" id="view-log">
      <div class="card">
        <div class="card-title" data-i18n="start_period"></div>
        <div class="form-section">
          <label class="form-label" data-i18n="start_date"></label>
          <input type="date" id="quick-start-date">
        </div>
        <div class="form-section">
          <label class="form-label" data-i18n="flow"></label>
          <div class="flow-row">
            <button class="flow-btn" data-flow="light">
              <span class="flow-dots">•</span>
              <span data-i18n="light"></span>
            </button>
            <button class="flow-btn selected" data-flow="medium">
              <span class="flow-dots">• •</span>
              <span data-i18n="medium"></span>
            </button>
            <button class="flow-btn" data-flow="heavy">
              <span class="flow-dots">• • •</span>
              <span data-i18n="heavy"></span>
            </button>
          </div>
        </div>
        <button class="btn-primary" id="quick-log-btn" data-i18n="log_period_start"></button>
      </div>


      <div class="card">
        <div class="card-title" data-i18n="log_today"></div>
        <div class="form-section">
          <label class="form-label" data-i18n="date"></label>
          <input type="date" id="log-date">
        </div>
        <div class="form-section">
          <label class="form-label" data-i18n="symptoms"></label>
          <div class="symptom-grid" id="symptom-grid">
            <!-- populated by JS -->
          </div>
        </div>
        <div class="form-section">
          <label class="form-label" data-i18n="mood"></label>
          <div class="mood-row" id="mood-row">
            <!-- populated by JS -->
          </div>
        </div>
        <div class="form-section">
          <label class="form-label" data-i18n="pain_level"></label>
          <input type="range" class="pain-slider" id="pain-level" min="0" max="10" value="0">
          <div class="pain-labels"><span data-i18n="none"></span><span data-i18n="moderate"></span><span data-i18n="severe"></span></div>
        </div>
        <div class="form-section">
          <label class="form-label" data-i18n="notes"></label>
          <textarea id="log-notes" data-i18n-placeholder="log_placeholder"></textarea>
        </div>
        <button class="btn-primary" id="save-log-btn" data-i18n="save_log"></button>
      </div>

      <div class="card">
        <div class="card-title" data-i18n="end_period"></div>
        <div class="form-section">
          <label class="form-label" data-i18n="end_date"></label>
          <input type="date" id="end-date">
        </div>
        <button class="btn-primary" id="end-period-btn" style="background: linear-gradient(135deg,#3d2d60,#2a1f45);" data-i18n="mark_period_ended"></button>
      </div>
    </div>

    <!-- ── HISTORY ────────────────────────────────────────────── -->
    <div class="view" id="view-history">
      <div class="card">
        <div class="card-title" data-i18n="past_cycles"></div>
        <div id="cycle-list"><p style="color:var(--text-muted);font-size:13px;" data-i18n="no_cycles">No cycles logged yet.</p></div>
      </div>
    </div>

  </main>
</div>

<script>
const API = '';

// Translations
let translations = {};

async function loadTranslations(lang) {
  try {
    const res = await fetch(`/static/translations/${lang}.json`);
    translations = await res.json();
  } catch (e) {
    console.warn('Translation load failed, fallback to EN');
    if (lang !== 'en') {
      return loadTranslations('en');
    }
  }
}

function t(key) {
  return translations[key] || key;
}

function tVars(key, vars = {}) {
  let str = t(key); // your existing t() function
  for (const k in vars) {
    str = str.replace(`{${k}}`, vars[k]);
  }
  return str;
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = t(el.dataset.i18nTitle);
  });
  if (typeof renderCalendar === 'function') {
    renderCalendar();
  }
}


// ── State ──────────────────────────────────────────────────────────────────
let cycles = [], symptoms = [], predictions = {};
let calYear, calMonth;
let selectedFlow = 'medium';
let selectedSymptoms = new Set();
let selectedMood = null;

let SYMPTOMS = [], MOODS = [];



// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const langSelect = document.getElementById('lang-select');
  
  // Set saved language or default
  langSelect.value = localStorage.getItem('lang') || 'en';

  // Load translations on page load
  await loadTranslations(langSelect.value);
  SYMPTOMS = t('symptoms_list');
  MOODS = t('moods');
  applyTranslations();

  // Handle language changes
  langSelect.addEventListener('change', async () => {
    localStorage.setItem('lang', langSelect.value);
    await loadTranslations(langSelect.value);
    applyTranslations();
  });

  const today = new Date().toISOString().slice(0,10);
  document.getElementById('quick-start-date').value = today;
  document.getElementById('log-date').value = today;
  document.getElementById('end-date').value = today;

  buildSymptomGrid();
  buildMoodRow();

  calYear = new Date().getFullYear();
  calMonth = new Date().getMonth();
  renderCalendar();

  loadAll();
  setupNav();
  setupForms();
  setupServiceWorker();
  setupPWA();
  monitorOffline();
});

async function loadAll() {
  try {
    const [c, s, p] = await Promise.all([
      fetch(`${API}/api/cycles`).then(r=>r.json()),
      fetch(`${API}/api/symptoms`).then(r=>r.json()),
      fetch(`${API}/api/predictions`).then(r=>r.json()),
    ]);
    cycles = c; symptoms = s; predictions = p;
    renderHome();
    renderCalendar();
    renderHistory();
  } catch(e) {
    console.warn('Offline, using cached UI');
  }
  applyTranslations();
}

// ── Nav ────────────────────────────────────────────────────────────────────
function setupNav() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('view-' + btn.dataset.view).classList.add('active');
    });
  });
}

// ── Home ───────────────────────────────────────────────────────────────────
function renderHome() {
  const activeCycle = cycles.find(c => !c.end_date);
  const lastCycle = cycles.find(c => c.start_date);

  let dayNum = '—', phase = t('unknown'), phaseLabel = t('no_data');

  if (activeCycle) {
    const start = new Date(activeCycle.start_date);
    const today = new Date(); today.setHours(0,0,0,0);
    dayNum = Math.floor((today - start) / 86400000) + 1;
    phase = 'menstrual'; phaseLabel = t('menstrual');
  } else if (predictions.next_period && predictions.cycle_length) {
    const next = new Date(predictions.next_period);
    const last = new Date(predictions.last_period);
    const today = new Date(); today.setHours(0,0,0,0);
    const dayOfCycle = Math.floor((today - last) / 86400000) + 1;
    dayNum = dayOfCycle;
    const cl = predictions.cycle_length;
    if (dayOfCycle <= 5) { phase='menstrual'; phaseLabel=t('menstrual'); }
    else if (dayOfCycle <= cl * 0.4) { phase='follicular'; phaseLabel=t('follicular'); }
    else if (dayOfCycle <= cl * 0.55) { phase='ovulation'; phaseLabel=t('ovulation'); }
    else { phase='luteal'; phaseLabel=t('luteal'); }

    const progress = Math.min(dayOfCycle / cl, 1);
    document.getElementById('ring-progress').style.strokeDashoffset = 377 * (1 - progress);
  }

  document.getElementById('day-num').textContent = dayNum;
  const badge = document.getElementById('phase-badge');
  badge.textContent = phaseLabel;
  badge.className = `phase-badge phase-${phase}`;

  if (typeof dayNum === 'number' && predictions.cycle_length) {
    const progress = Math.min(dayNum / predictions.cycle_length, 1);
    document.getElementById('ring-progress').style.strokeDashoffset = 377 * (1 - progress);
  }

  if (predictions.next_period) {
    const np = new Date(predictions.next_period);
    const today = new Date(); today.setHours(0,0,0,0);
    const days = Math.round((np - today) / 86400000);

    // Predicted next
    document.getElementById('pred-next').textContent =
      days === 0
        ? t('today')
        : days > 0
          ? tVars('in_days', { days })
          : tVars('days_ago', { days: Math.abs(days) });

    // Fertile window
    document.getElementById('pred-fertile').textContent =
      predictions.fertile_window
        ? `${fmtShort(predictions.fertile_window.start)} – ${fmtShort(predictions.fertile_window.end)}`
        : '—';

    // Cycle length
    document.getElementById('pred-cycle').textContent =
      predictions.cycle_length
        ? `${predictions.cycle_length} ${t('days_label')}`
        : '—';

    // document.getElementById('pred-next').textContent = days === 0 ? 'Today' : days > 0 ? `In ${days} days` : `${Math.abs(days)} days ago`;
    // document.getElementById('pred-fertile').textContent = predictions.fertile_window
    //   ? `${fmtShort(predictions.fertile_window.start)} – ${fmtShort(predictions.fertile_window.end)}`
    //   : '—';
    // document.getElementById('pred-cycle').textContent = predictions.cycle_length ? `${predictions.cycle_length} days` : '—';
  }
}

function fmtShort(iso) {
  const d = new Date(iso  /*+ 'T00:00:00' */);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

// ── Calendar ───────────────────────────────────────────────────────────────
function renderCalendar() {
  const MONTHS =  t('months');
  const DOWS = t('dows');
  const weekStart = t('weekstart');
  // Rotate DOWS so first day matches locale
  const DOWS_LOCALE = [...DOWS.slice(weekStart), ...DOWS.slice(0, weekStart)];
  document.getElementById('cal-month-label').textContent = `${MONTHS[calMonth]} ${calYear}`;

  const dowEl = document.getElementById('cal-dow');
  dowEl.innerHTML = DOWS_LOCALE.map(d => `<div class="cal-dow">${d}</div>`).join('');

  let firstDay = new Date(calYear, calMonth, 1).getDay();
  firstDay = (firstDay - weekStart + 7) % 7; 
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  // Build sets for fast lookup
  const periodDays = new Set(), periodStarts = new Set(), fertileDays = new Set(), predictedDays = new Set(), symptomDays = new Set();

  cycles.forEach(c => {
    const start = new Date(c.start_date /*+ 'T00:00:00' */);
    const end = c.end_date ? new Date(c.end_date  /*+ 'T00:00:00' */) : new Date(start.getTime() + 5*86400000);
    periodStarts.add(c.start_date);
    for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1))
      periodDays.add(d.toISOString().slice(0,10));
  });

  if (predictions.fertile_window) {
    const fs = new Date(predictions.fertile_window.start  /*+ 'T00:00:00' */);
    const fe = new Date(predictions.fertile_window.end  /*+ 'T00:00:00' */);
    for (let d = new Date(fs); d <= fe; d.setDate(d.getDate()+1))
      fertileDays.add(d.toISOString().slice(0,10));
  }
  if (predictions.next_period) {
    const np = new Date(predictions.next_period  /*+ 'T00:00:00' */);
    for (let i = 0; i < 6; i++) {
      const d = new Date(np); d.setDate(d.getDate()+i);
      predictedDays.add(d.toISOString().slice(0,10));
    }
  }
  symptoms.forEach(s => symptomDays.add(s.log_date));

  const grid = document.getElementById('cal-days');
  grid.innerHTML = '';

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('button'); el.className = 'cal-day empty'; el.textContent = ' '; grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el = document.createElement('button');
    el.className = 'cal-day';
    el.textContent = d;
    const dt = new Date(iso  /*+ 'T00:00:00' */);
    if (dt.getTime() === today.getTime()) el.classList.add('today');
    if (periodStarts.has(iso)) el.classList.add('period-start');
    else if (periodDays.has(iso)) el.classList.add('period');
    else if (fertileDays.has(iso)) el.classList.add('fertile');
    else if (predictedDays.has(iso)) el.classList.add('predicted');
    if (symptomDays.has(iso)) el.classList.add('has-symptoms');
    grid.appendChild(el);
  }
}

document.getElementById('cal-prev').addEventListener('click', () => {
  calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar();
});
document.getElementById('cal-next').addEventListener('click', () => {
  calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar();
});

// ── History ────────────────────────────────────────────────────────────────
  function renderHistory() {
    const el = document.getElementById('cycle-list');
    if (!cycles.length) { el.innerHTML = '<p style="color:var(--text-muted);font-size:13px;">No cycles logged yet.</p>'; return; }
    el.innerHTML = cycles.map(c => {
      const dur = c.end_date
        ? Math.round((new Date(c.end_date) - new Date(c.start_date)) / 86400000) + 1
        : '?';
      return `<div class="cycle-item">
                <div class="cycle-dates">
                  ${fmtShort(c.start_date)}${c.end_date ? ' – ' + fmtShort(c.end_date) : ` (${t('ongoing')})`}
                  <small>${dur} ${t('days_label')} · ${tVars('flow_label', { flow_intensity: t(c.flow_intensity.toLowerCase()) }).toLowerCase()}</small>
                </div>
                <button class="cycle-delete" onclick="deleteCycle(${c.id})">✕</button>
              </div>`;
    }).join('');
  }

  async function deleteCycle(id) {
  await fetch(`${API}/api/cycles/${id}`, { method: 'DELETE' });
  await loadAll();
  toast(t('cycle_removed'));
}

// ── Forms ──────────────────────────────────────────────────────────────────
function setupForms() {
  // Flow buttons
  document.querySelectorAll('.flow-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.flow-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedFlow = btn.dataset.flow;
    });
  });

  // Quick log
  document.getElementById('quick-log-btn').addEventListener('click', async () => {
    const date = document.getElementById('quick-start-date').value;
    if (!date) return toast('Please select a date');
    const res = await fetch(`${API}/api/cycles`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ start_date: date, flow_intensity: selectedFlow })
    });
    if (res.ok) { await loadAll(); toast('Period logged ✓'); }
  });

  // End period
  document.getElementById('end-period-btn').addEventListener('click', async () => {
    const endDate = document.getElementById('end-date').value;
    const active = cycles.find(c => !c.end_date);
    if (!active) return toast('No active period to end');
    const res = await fetch(`${API}/api/cycles/${active.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ end_date: endDate })
    });
    if (res.ok) { await loadAll(); toast('Period ended ✓'); }
  });

  // Symptom save
  document.getElementById('save-log-btn').addEventListener('click', async () => {
    const date = document.getElementById('log-date').value;
    if (!date) return toast('Please select a date');
    const res = await fetch(`${API}/api/symptoms`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        log_date: date,
        symptoms: [...selectedSymptoms],
        mood: selectedMood,
        pain_level: parseInt(document.getElementById('pain-level').value),
        notes: document.getElementById('log-notes').value
      })
    });
    if (res.ok) {
      await loadAll();
      toast('Log saved ✓');
      selectedSymptoms.clear();
      selectedMood = null;
      document.querySelectorAll('.symptom-chip').forEach(c => c.classList.remove('selected'));
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('pain-level').value = 0;
      document.getElementById('pain-val').textContent = '0';
      document.getElementById('log-notes').value = '';
    }
  });

  // Pain slider
  document.getElementById('pain-level').addEventListener('input', e => {
    document.getElementById('pain-val').textContent = e.target.value;
  });
}

function buildSymptomGrid() {
  const grid = document.getElementById('symptom-grid');
  grid.innerHTML = SYMPTOMS.map(s =>
    `<button class="symptom-chip" data-sym="${s}">${s}</button>`
  ).join('');
  grid.querySelectorAll('.symptom-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('selected');
      if (chip.classList.contains('selected')) selectedSymptoms.add(chip.dataset.sym);
      else selectedSymptoms.delete(chip.dataset.sym);
    });
  });
}

function buildMoodRow() {
  const row = document.getElementById('mood-row');
  row.innerHTML = MOODS.map(m =>
    `<button class="mood-btn" data-mood="${m.l}"><span>${m.e}</span><span>${m.l}</span></button>`
  ).join('');
  row.querySelectorAll('.mood-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      row.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedMood = btn.dataset.mood;
    });
  });
}

// ── Service Worker & PWA ───────────────────────────────────────────────────
function setupServiceWorker() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
      .then(reg => console.log('SW registered', reg.scope))
      .catch(e => console.warn('SW error', e));
  }
}

let deferredPrompt = null;
function setupPWA() {
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-btn').style.display = 'flex';
    document.getElementById('install-banner').classList.add('visible');
  });

  const install = () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(c => {
        if (c.outcome === 'accepted') {
          document.getElementById('install-btn').style.display = 'none';
          document.getElementById('install-banner').classList.remove('visible');
          toast('Periodt installed! ✓');
        }
        deferredPrompt = null;
      });
    }
  };
  document.getElementById('install-btn').addEventListener('click', install);
  document.getElementById('install-banner-btn').addEventListener('click', install);

  document.getElementById('notif-btn').addEventListener('click', async () => {
    if (!('Notification' in window)) return toast('Notifications not supported');
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      toast('Notifications enabled 🔔');
      document.getElementById('notif-btn').classList.add('active');
      await subscribePush();
    } else {
      toast('Notifications blocked');
    }
  });
}

async function subscribePush() {
  if (!('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: null
    });
    await fetch(`${API}/api/push/subscribe`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subscription: sub.toJSON() })
    });
  } catch(e) { console.warn('Push subscribe error', e); }
}

function monitorOffline() {
  const bar = document.getElementById('offline-bar');
  window.addEventListener('offline', () => bar.classList.add('show'));
  window.addEventListener('online', () => bar.classList.remove('show'));
  if (!navigator.onLine) bar.classList.add('show');
}

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
